{% extends "registry/base.html" %}
{% block content %}
<section class="mx-auto max-w-3xl">
    <div class="panel">
        <div class="mb-6 flex items-center justify-between">
            <div>
                <h2>{% if house %}Uyni tahrirlash{% else %}Yangi uy yaratish{% endif %}</h2>
                <p class="mt-1 text-sm text-[#5C5E62]">Xonalar avtomatik yaratiladi va shu uyga ulanadi.</p>
            </div>
            <i class="bi bi-building-add text-3xl text-[#3E6AE1]"></i>
        </div>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <label class="block"><span class="label">{{ form.street_name.label }}</span>{{ form.street_name }}{% for error in form.street_name.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <label class="block"><span class="label">{{ form.house_number.label }}</span>{{ form.house_number }}{% for error in form.house_number.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <label class="block"><span class="label">{{ form.entrance_count.label }}</span>{{ form.entrance_count }}{% for error in form.entrance_count.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <label class="block"><span class="label">{{ form.apartments_per_entrance.label }}</span>{{ form.apartments_per_entrance }}{% for error in form.apartments_per_entrance.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <label class="block"><span class="label">{{ form.color.label }}</span>{{ form.color }}{% for error in form.color.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <label class="block"><span class="label">{{ form.entrance_camera.label }}</span>{{ form.entrance_camera }}{% for error in form.entrance_camera.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <div class="conditional-fields" data-conditional-for="entrance_camera">
                <label class="block"><span class="label">{{ form.entrance_camera_count.label }}</span>{{ form.entrance_camera_count }}{% for error in form.entrance_camera_count.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            </div>
            <label class="block"><span class="label">{{ form.yard_camera.label }}</span>{{ form.yard_camera }}{% for error in form.yard_camera.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <div class="conditional-fields" data-conditional-for="yard_camera">
                <label class="block"><span class="label">{{ form.yard_camera_count.label }}</span>{{ form.yard_camera_count }}{% for error in form.yard_camera_count.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            </div>
            <label class="block"><span class="label">{{ form.entrance_sos_button.label }}</span>{{ form.entrance_sos_button }}{% for error in form.entrance_sos_button.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            <div class="conditional-fields" data-conditional-for="entrance_sos_button">
                <label class="block"><span class="label">{{ form.entrance_sos_button_count.label }}</span>{{ form.entrance_sos_button_count }}{% for error in form.entrance_sos_button_count.errors %}<span class="field-error">{{ error }}</span>{% endfor %}</label>
            </div>
            <button class="btn-primary w-full justify-center" type="submit"><i class="bi bi-check2"></i>{% if house %}O'zgarishlarni saqlash{% else %}Uy yaratish{% endif %}</button>
        </form>
    </div>
</section>
{% endblock %}
